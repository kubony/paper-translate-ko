name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
      - name: Compile scripts
        run: python3 -m py_compile scripts/*.py
      - name: Run unit tests
        run: uv run --quiet --with pymupdf python3 -m unittest discover -s tests -v
      - name: Check CLI usage paths
        run: |
          python3 scripts/fetch_arxiv.py >/tmp/fetch_usage.txt || test $? -eq 1
          python3 scripts/render_pdf.py >/tmp/render_usage.txt || test $? -eq 1
          uv run --quiet --with pymupdf python3 scripts/extract_figures.py >/tmp/extract_usage.txt || test $? -eq 1
          uv run --quiet --with pymupdf python3 scripts/validate_output.py >/tmp/validate_usage.txt || test $? -eq 1
